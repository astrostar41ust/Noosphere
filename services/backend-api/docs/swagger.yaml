      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      role:
        type: string
      session_id:
        type: string
    type: object
  internal_modules_chat.SendMessageRequest:
    properties:
      content:
        minLength: 1
        type: string
      role:
        enum:
        - user
        - assistant
        - system
        type: string
      session_id:
        type: string
    required:
    - content
    - role
    - session_id
    type: object
host: localhost:8080
info:
  contact: {}
  description: Core high-performance orchestration gateway for the Noosphere ecosystem.
  title: Noosphere Backend API Engine
  version: "1.0"
paths:
