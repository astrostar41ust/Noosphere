    post:
      consumes:
      - application/json
      description: Validates incoming token data streams and persists user/assistant
        dialogue payloads.
      parameters:
      - description: Chat Message Structure Payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_modules_chat.SendMessageRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_chat.ChatMessageResponse'
        "400":
          description: Invalid JSON or schema validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal processing engine database exception
          schema:
            additionalProperties:
              type: string
            type: object
